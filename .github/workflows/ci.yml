# GitHub Actions CI — lbta-website-draft-3-5-26
# Generated by project-kit-apply.sh on 2026-06-22
#
# STATUS: ADVISORY (reports, does not block merges)
# Flip to required once green-stable:
#   1. Go to Settings → Branches → Branch protection rules for main
#   2. Enable "Require status checks to pass" → add "ci"
#   3. Remove the `continue-on-error: true` lines below
#
# Detects your package manager (pnpm/yarn/npm) and only runs scripts that exist.

name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    # ADVISORY: never blocks a merge. Remove this line once green-stable.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f "yarn.lock" ]; then
            echo "pm=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.pm.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.pm.outputs.pm }}

      - name: Install dependencies
        run: ${{ steps.pm.outputs.pm }} install
        continue-on-error: true

      - name: Lint (if script exists)
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1)" 2>/dev/null; then
            ${{ steps.pm.outputs.pm }} run lint
          else
            echo "[ci] No lint script found — skipping"
          fi
        continue-on-error: true

      - name: Type check (if script exists)
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.typecheck ? 0 : 1)" 2>/dev/null; then
            ${{ steps.pm.outputs.pm }} run typecheck
          elif node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['type-check'] ? 0 : 1)" 2>/dev/null; then
            ${{ steps.pm.outputs.pm }} run type-check
          else
            echo "[ci] No typecheck script found — skipping"
          fi
        continue-on-error: true

      - name: Build (if script exists)
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)" 2>/dev/null; then
            ${{ steps.pm.outputs.pm }} run build
          else
            echo "[ci] No build script found — skipping"
          fi
        continue-on-error: true

      - name: Test (if script exists)
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)" 2>/dev/null; then
            ${{ steps.pm.outputs.pm }} run test
          else
            echo "[ci] No test script found — skipping"
          fi
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "### CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Project: lbta-website-draft-3-5-26" >> "$GITHUB_STEP_SUMMARY"
          echo "Advisory mode: ON (not blocking merges yet)" >> "$GITHUB_STEP_SUMMARY"
          echo "To make required: Settings → Branch protection → Require status check 'ci'" >> "$GITHUB_STEP_SUMMARY"
