<!-- Trust stats row (data: stats from site-stats.json + coaches.json roster) -->
<div class="stat-row" style="padding: 10pt 0;">
  <div class="stat">
    <div class="num">{{ stats.years_experience }}</div>
    <div class="label">Years in tennis</div>
  </div>
  <div class="stat">
    <div class="num">{{ stats.players_count }}</div>
    <div class="label">Active players</div>
  </div>
  <div class="stat">
    <div class="num">{{ stats.d1_placements }}</div>
    <div class="label">D1 placements</div>
  </div>
  <div class="stat">
    <div class="num">{{ stats.rating }}</div>
    <div class="label">{{ stats.review_count }} reviews</div>
  </div>
</div>
